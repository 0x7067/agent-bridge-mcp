name: release-rust

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: agent-bridge-mcp-linux-x64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: agent-bridge-mcp-macos-x64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: agent-bridge-mcp-macos-arm64

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build binary
        run: cargo build --locked --release --target ${{ matrix.target }} --bin agent-bridge-mcp
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/agent-bridge-mcp" "dist/${{ matrix.artifact }}"
          shasum -a 256 "dist/${{ matrix.artifact }}" > "dist/${{ matrix.artifact }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*
